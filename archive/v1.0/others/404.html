<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Lost in the Void</title>

<style>
    :root {
        --bg: #0b0f14;
        --panel: #111826;
        --text: #e6eaf2;
        --muted: #8b93a7;
        --accent: #7c9cff;
    }

    * {
        box-sizing: border-box;
        font-family: system-ui, monospace;
    }

    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #121a2a, var(--bg));
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .panel {
        background: var(--panel);
        padding: 2.5rem 2rem;
        border-radius: 16px;
        text-align: center;
        width: min(90%, 420px);
        box-shadow: 0 20px 60px rgba(0,0,0,.6);
        animation: float 4s ease-in-out infinite;
    }

    h1 {
        font-size: 5rem;
        margin: 0;
        color: var(--accent);
        letter-spacing: 4px;
    }

    p {
        margin: 0.5rem 0 1.5rem;
        color: var(--muted);
        line-height: 1.5;
    }

    button {
        background: none;
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 0.6rem 1.2rem;
        border-radius: 10px;
        cursor: pointer;
        transition: all .2s ease;
    }

    button:hover {
        background: var(--accent);
        color: #000;
        transform: translateY(-2px);
    }

    .counter {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--muted);
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }
</style>
</head>
<body>

<div class="panel">
    <h1>404</h1>
    <p>
        You found nothing.<br>
        Which is impressive, honestly.
    </p>

    <button id="poke">Poke the void</button>
    <div class="counter" id="count">Void poked: 0 times</div>
</div>

<script>
    let pokes = 0;
    const btn = document.getElementById("poke");
    const count = document.getElementById("count");

    btn.addEventListener("click", () => {
        pokes++;
        count.textContent = `Void poked: ${pokes} times`;

        btn.style.transform = `rotate(${(Math.random() * 6 - 3)}deg)`;
    });
</script>

</body>
</html>
